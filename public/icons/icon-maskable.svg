<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Bonsai Companion">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6f9a63" />
      <stop offset="1" stop-color="#46623d" />
    </linearGradient>
    <linearGradient id="foliage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f2e6" />
      <stop offset="1" stop-color="#dbe0cc" />
    </linearGradient>
    <linearGradient id="pot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dcb890" />
      <stop offset="1" stop-color="#bd8f68" />
    </linearGradient>
  </defs>

  <!-- Full-bleed background (no rounded corners): the platform applies its own
       mask. The tree is scaled to ~84% around centre so a circular mask keeps
       the whole silhouette inside the safe zone. -->
  <rect width="512" height="512" fill="url(#tile)" />

  <g transform="translate(256 256) scale(0.84) translate(-256 -256)">
    <ellipse cx="256" cy="420" rx="120" ry="13" fill="#2c4126" opacity="0.30" />

    <rect x="212" y="406" width="26" height="12" rx="3" fill="#a97f59" />
    <rect x="274" y="406" width="26" height="12" rx="3" fill="#a97f59" />
    <path d="M180 366 h152 l-16 42 a8 8 0 0 1 -7.5 5 h-105 a8 8 0 0 1 -7.5 -5 z" fill="url(#pot)" />
    <rect x="168" y="352" width="176" height="20" rx="8" fill="url(#pot)" />
    <rect x="168" y="352" width="176" height="6" rx="3" fill="#ffffff" opacity="0.18" />

    <path
      d="M242 360 C232 322, 258 312, 246 282 C238 262, 258 250, 252 212 L268 212 C274 250, 260 268, 272 288 C284 316, 252 324, 270 360 Z"
      fill="#ece7d6"
    />
    <path d="M258 296 C292 288, 312 274, 332 256" fill="none" stroke="#ece7d6" stroke-width="13" stroke-linecap="round" />

    <g fill="url(#foliage)">
      <ellipse cx="188" cy="214" rx="62" ry="38" />
      <ellipse cx="344" cy="236" rx="44" ry="26" />
      <ellipse cx="322" cy="196" rx="92" ry="52" />
      <ellipse cx="258" cy="150" rx="80" ry="47" />
    </g>
    <ellipse cx="230" cy="134" rx="30" ry="15" fill="#ffffff" opacity="0.30" />
  </g>
</svg>
