name: Reconcile storage (orphan sweep)

# Removes stranded photo objects (no `photos` row, older than a 24h grace
# window) from the tree-photos bucket — the storage-first/DB-second upload can
# orphan bytes if a tab closes mid-upload. No-op until you add the
# SUPABASE_URL and SUPABASE_SERVICE_ROLE_KEY repository Action secrets. The
# service-role key lives ONLY here, never in the app runtime. Scheduled runs
# delete; manual runs default to a dry-run preview.

on:
  schedule:
    - cron: "0 4 1 * *" # monthly, the 1st at 04:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: "List orphans without deleting"
        type: boolean
        default: true

permissions:
  contents: read
  issues: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Reconcile
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY_RUN: ${{ inputs.dry_run == true && 'true' || 'false' }}
        run: node scripts/reconcile-storage.mjs

      - name: Open an ops-alert issue on failure
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Ops alert: ${{ github.workflow }} failed"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "\"$title\" in:title" --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" --body "Failed again: $run_url"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" \
              --body "Scheduled workflow failed: $run_url — triage steps in docs/operations/runbook.md."
          fi
