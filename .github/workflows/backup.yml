name: Weekly database backup

# Free-tier Supabase has NO managed backups (Risk R9). This dumps the hosted
# DATABASE (schema + data) every week and keeps it as a downloadable artifact.
# NOTE: photos (Storage bucket bytes) are NOT included — see the runbook's
# backups section for the monthly photo-archive cadence.
# Requires the SUPABASE_DB_URL repository Action secret: the SESSION-POOLER URI
# from the dashboard's "Connect" button
# (postgresql://postgres.<ref>:<pwd>@aws-0-<region>.pooler.supabase.com:5432/postgres).
# Do NOT use the direct connection (IPv6-only on the free tier — GitHub-hosted
# runners can't reach it) or the transaction pooler (port 6543 — breaks pg_dump).
# This workflow FAILS LOUD: a missing/malformed secret or a failed/empty dump
# turns the run red and files an ops-alert issue. Scheduled workflows run from
# the default branch only. Restore procedure:
# docs/operations/runbook.md#backups--restore-r9--free-tier-has-no-managed-backups

on:
  schedule:
    - cron: "0 5 * * 0" # every Sunday at 05:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check the connection-string secret
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "::error::Secret SUPABASE_DB_URL is not set — the weekly backup is NOT running. Add the Session-pooler URI (dashboard → Connect)."
            exit 1
          fi
          if ! node -e "new URL(process.env.SUPABASE_DB_URL)" 2>/dev/null; then
            echo "::error::SUPABASE_DB_URL is not a parseable URL. Most common cause: the database password contains special characters (@ : / # ? & or spaces) or the [brackets] around [YOUR-PASSWORD] were left in. Fix: Supabase → Project Settings → Database → Reset database password (Generate again until it has no special characters — this does NOT affect the app), rebuild the URI, update the secret."
            exit 1
          fi
          node -e '
            const u = new URL(process.env.SUPABASE_DB_URL);
            if (!u.hostname.endsWith("pooler.supabase.com"))
              { console.error("::error::Host is " + u.hostname + " — use the SESSION POOLER URI (…pooler.supabase.com). The direct connection is IPv6-only on the free tier and unreachable from GitHub runners."); process.exit(1); }
            if (u.port === "6543")
              { console.error("::error::Port 6543 is the transaction pooler, which breaks pg_dump — copy the Session pooler URI (port 5432)."); process.exit(1); }
          '

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Dump database (schema + data)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          pnpm exec supabase db dump --db-url "$SUPABASE_DB_URL" -f backup-schema.sql
          pnpm exec supabase db dump --db-url "$SUPABASE_DB_URL" -f backup-data.sql --data-only
          echo "Dumped $(wc -l < backup-schema.sql) schema lines, $(wc -l < backup-data.sql) data lines."

      - name: Verify the dump is not trivially broken
        run: |
          grep -q "CREATE TABLE" backup-schema.sql || { echo "::error::backup-schema.sql contains no CREATE TABLE — the dump is unusable."; exit 1; }
          [ -s backup-data.sql ] || { echo "::error::backup-data.sql is empty."; exit 1; }
          if ! grep -qE "^(COPY|INSERT)" backup-data.sql; then
            echo "::warning::backup-data.sql has no COPY/INSERT blocks — fine only if the database is genuinely empty."
          fi

      - name: Upload backup artifact
        if: hashFiles('backup-*.sql') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: db-backup-${{ github.run_id }}
          path: backup-*.sql
          retention-days: 90

      - name: Open an ops-alert issue on failure
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Ops alert: ${{ github.workflow }} failed"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "\"$title\" in:title" --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" --body "Failed again: $run_url"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" \
              --body "Scheduled workflow failed: $run_url — triage steps in docs/operations/runbook.md."
          fi
