name: Photo backup (mirror to B2)

# The weekly DB dump contains only rows — photo BYTES had exactly one copy
# (Risk R9's second half, audit data-model finding). This mirrors the private
# tree-photos bucket to a Backblaze B2 bucket (10 GB free tier; ~450 MB photo
# budget) monthly, incrementally, and never deletes on the B2 side.
# Requires repo secrets: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY (already used
# by the orphan sweep) + B2_KEY_ID, B2_APP_KEY (bucket-scoped, Read & Write),
# B2_BUCKET. FAILS LOUD: missing secrets or a failed copy turn the run red and
# file an ops-alert issue. Scheduled workflows run from the default branch only.

on:
  schedule:
    - cron: "30 3 15 * *" # monthly, the 15th at 03:30 UTC (offset from the sweep)
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Mirror tree-photos to B2
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APP_KEY: ${{ secrets.B2_APP_KEY }}
          B2_BUCKET: ${{ secrets.B2_BUCKET }}
        run: node scripts/mirror-photos.mjs

      - name: Open an ops-alert issue on failure
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Ops alert: ${{ github.workflow }} failed"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "\"$title\" in:title" --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" --body "Failed again: $run_url"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" \
              --body "Scheduled workflow failed: $run_url — triage steps in docs/operations/runbook.md."
          fi
