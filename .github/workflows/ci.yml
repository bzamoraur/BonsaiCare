name: CI

# Quality gates on every PR and push to main:
#  - build:   typecheck, lint, format check, unit tests, production build
#  - db-test: apply migrations to a local Supabase stack, run the pgTAP RLS
#             isolation tests, and verify the committed DB types match the schema
#             (Docker is preinstalled on ubuntu runners).
#  - e2e:     Playwright auth/care journeys against the same local stack.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # pnpm version is read from the "packageManager" field in package.json.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Build
        # Placeholder public env so the production build can evaluate modules
        # that read them. No secrets and no network calls happen at build time.
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_placeholder_for_ci_build

  db-test:
    name: Database (RLS) tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Uses the supabase CLI pinned as a devDependency. Applies all migrations
      # (+ seed) to a local Postgres, then runs supabase/tests/*.sql via pgTAP.
      - name: Start Supabase
        run: pnpm exec supabase start

      - name: Run database tests (pgTAP)
        run: pnpm exec supabase test db

      # The committed TS types must match what the migrations produce. Regenerate
      # from the running local stack and diff — this catches a migration that
      # changed a column, enum, or relationship without a matching `pnpm gen:types`
      # (e.g. a single-column FK upgraded to composite). The PostgREST version
      # marker reflects the stack (local here vs the hosted project the committed
      # file targets), not the schema, so it is normalized out of the comparison.
      - name: Check generated types are in sync with the schema
        id: types_check
        run: |
          pnpm exec supabase gen types typescript --local > src/types/database.types.ts
          pnpm exec prettier --write src/types/database.types.ts
          norm='s/PostgrestVersion: "[^"]*"/PostgrestVersion: "_"/'
          if ! diff <(git show HEAD:src/types/database.types.ts | sed -E "$norm") \
                    <(sed -E "$norm" src/types/database.types.ts); then
            echo "::error::src/types/database.types.ts is out of sync with the migrations. Run 'pnpm gen:types' and commit the result (see the uploaded artifact for the expected file)."
            exit 1
          fi

      # On drift, hand back the exact expected file so it can be committed verbatim.
      - name: Upload expected types (on drift)
        if: failure() && steps.types_check.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: expected-database-types
          path: src/types/database.types.ts
          retention-days: 7

      - name: Stop Supabase
        if: always()
        run: pnpm exec supabase stop

  e2e:
    name: E2E (auth flows)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Cache the downloaded browser between runs (keyed on the lockfile, so a
      # Playwright version bump busts it). System libraries are not cached, so on
      # a hit we still run the fast `install-deps`.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      # Boots the same local Supabase stack the db-test job uses.
      - name: Start Supabase
        run: pnpm exec supabase start

      # Export the local stack's URL + keys so the build, the app, and the
      # Playwright global-setup (admin key, server-only) all share one source.
      - name: Configure env from local Supabase
        run: |
          eval "$(pnpm exec supabase status -o env)"
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
          } >> "$GITHUB_ENV"

      - name: Build
        run: pnpm build

      - name: Run e2e (Playwright)
        run: pnpm exec playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop Supabase
        if: always()
        run: pnpm exec supabase stop
