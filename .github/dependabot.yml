# Keeps the SHA-pinned Actions and npm deps current without churn: monthly,
# minor+patch grouped into one PR each. Security advisories arrive separately
# via Dependabot alerts (enabled repo-side), independent of this schedule.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 3

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]
